_min_copier_version: "9"
_subdirectory: template
_exclude:
  - "{% if not include_http_runtime %}{{ package_name }}/runtimes/http{% endif %}"
  - "{% if not include_http_runtime %}{{ package_name }}/infra/metrics{% endif %}"
  - "{% if not include_http_runtime %}tests/test_healthcheck.py{% endif %}"
  - "{% if not include_tg_bot_runtime or not include_http_runtime %}{{ package_name }}/runtimes/tg_bot{% endif %}"
  - "{% if not include_tg_bot_runtime or not include_http_runtime %}tests/test_tg_bot_runtime.py{% endif %}"
  - "{% if not include_tg_bot_runtime or not include_http_runtime %}{{ package_name }}/runtimes/http/routers/telegram.py{% endif %}"
  - "{% if not include_redis_plugin %}{{ package_name }}/infra/redis{% endif %}"
  - "{% if not include_stream_runtime or not include_redis_plugin %}{{ package_name }}/runtimes/stream{% endif %}"
  - "{% if not include_stream_runtime or not include_redis_plugin %}tests/test_stream_runtime.py{% endif %}"
  - "{% if not include_postgresql_plugin %}{{ package_name }}/infra/db{% endif %}"
  - "{% if not include_postgresql_plugin %}alembic.ini{% endif %}"
  - "{% if not include_postgresql_plugin %}alembic{% endif %}"
  - "{% if not include_users_plugin or not include_postgresql_plugin %}{{ package_name }}/features/users{% endif %}"
  - "{% if not include_users_plugin or not include_postgresql_plugin %}{{ package_name }}/models/user.py{% endif %}"
  - "{% if not include_users_plugin or not include_postgresql_plugin %}{{ package_name }}/infra/db/models/users.py{% endif %}"
  - "{% if not include_users_plugin or not include_postgresql_plugin or not include_http_runtime %}{{ package_name }}/runtimes/http/dependencies/users.py{% endif %}"
  - "{% if not include_users_plugin or not include_postgresql_plugin or not include_http_runtime %}{{ package_name }}/runtimes/http/schemas/users.py{% endif %}"
  - "{% if not include_users_plugin or not include_postgresql_plugin or not include_http_runtime %}{{ package_name }}/runtimes/http/routers/users.py{% endif %}"
  - "{% if not include_users_plugin or not include_postgresql_plugin or not include_http_runtime %}tests/test_users_plugin.py{% endif %}"

project_name:
  type: str
  help: Human-readable project name
  default: My Service

project_slug:
  type: str
  help: Repository/distribution slug
  default: my-service

package_name:
  type: str
  help: Python package name
  default: my_service

project_description:
  type: str
  help: Short project description
  default: Minimal Python service scaffold

python_version:
  type: str
  help: Python minor version for the project and Docker image
  default: "3.13"

include_http_runtime:
  type: bool
  help: Include the HTTP runtime built with FastAPI?
  default: true

include_tg_bot_runtime:
  type: bool
  help: Include the Telegram bot component built with aiogram? Requires HTTP runtime.
  default: false

include_stream_runtime:
  type: bool
  help: Include the stream runtime built with FastStream? Requires Redis integration.
  default: false

include_redis_plugin:
  type: bool
  help: Include the Redis integration block?
  default: false

include_postgresql_plugin:
  type: bool
  help: Include the PostgreSQL db plugin?
  default: false

include_users_plugin:
  type: bool
  help: Include the ready-to-use users feature package? Requires PostgreSQL.
  default: false

include_pre_commit:
  type: bool
  help: Set up pre-commit hooks?
  default: false
